# Tests + Allure report. GitHub Pages deploy only from default branch (push/schedule);
# pull requests upload the HTML report as a downloadable workflow artifact.

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Approximately every two weeks (1st and 15th, 06:00 UTC)
    - cron: "0 6 1,15 * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

# Opt into Node.js 24 for JavaScript-based actions (avoids Node 20 deprecation warnings until actions ship Node 24 builds).
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Test & build Allure report
    runs-on: ubuntu-latest
    outputs:
      pytest_outcome: ${{ steps.pytest.outcome }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Pipfile.lock

      - name: Install Pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev --deploy

      - name: Install Google Chrome
        run: |
          set -eux
          curl -sS -L -o /tmp/chrome.deb "https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb"
          sudo apt-get update
          sudo apt-get install -y /tmp/chrome.deb

      # Values: Settings → Secrets and variables → Actions → Variables / Secrets
      # (optional). Defaults match the public Sauce Demo site if unset.
      - name: Create .env for CI
        env:
          URL: ${{ vars.SAUCE_DEMO_URL || 'https://www.saucedemo.com' }}
          USER: ${{ vars.SAUCE_DEMO_USER || 'standard_user' }}
          PASS: ${{ secrets.SAUCE_DEMO_PASS || vars.SAUCE_DEMO_PASS || 'secret_sauce' }}
          BROWSER: ${{ vars.SAUCE_DEMO_BROWSER || 'chrome' }}
          HEADLESS: ${{ vars.SAUCE_DEMO_HEADLESS || 'true' }}
        run: |
          cat > .env << EOF
          URL=$URL
          USER=$USER
          PASS=$PASS
          browser=$BROWSER
          headless=$HEADLESS
          EOF

      - name: Run tests (Allure results)
        id: pytest
        continue-on-error: true
        run: pipenv run pytest tests/ -v --alluredir=allure-results

      - name: Set up Java (Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        run: |
          set -eux
          ALLURE_VERSION=2.27.0
          curl -sSL -o /tmp/allure.tgz "https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/${ALLURE_VERSION}/allure-commandline-${ALLURE_VERSION}.tgz"
          sudo tar -xzf /tmp/allure.tgz -C /opt/
          echo "/opt/allure-${ALLURE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Generate Allure HTML report
        if: always()
        continue-on-error: true
        run: |
          set -eux
          mkdir -p allure-results
          if allure generate allure-results -o allure-report --clean; then
            echo "Allure report generated."
          else
            mkdir -p allure-report
            printf '%s\n' '<!doctype html><meta charset="utf-8"><title>Allure</title><p>Allure could not be generated from the results directory.</p>' > allure-report/index.html
          fi

      - name: Upload Allure report (workflow artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      # Pages only for the repo default branch (not PRs). Uses default_branch so main/master/develop all work.
      - name: Upload Pages artifact
        if: >-
          always() &&
          (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
          github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy:
    name: Deploy Allure to GitHub Pages
    needs: build
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Fails the workflow after deploy (or when deploy is skipped on PRs) so Pages/artifacts are ready first.
  ci-status:
    name: Fail if tests failed
    needs: [build, deploy]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      needs.build.outputs.pytest_outcome == 'failure' &&
      (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Pytest failures
        run: |
          echo "::error::Pytest reported failures — see Allure artifact or GitHub Pages."
          exit 1
